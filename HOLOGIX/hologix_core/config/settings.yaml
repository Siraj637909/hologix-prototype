app_name: HOLOGIX
api_port: 11435
api_host: 127.0.0.1
debug_mode: false
max_request_size: 10485760

# Database settings
database_url: sqlite+aiosqlite:///./data/hologix.db

# Model settings
default_context_length: 4096
default_max_tokens: 2048

# Rate limiting
rate_limit_requests_per_minute: 60
rate_limit_tokens_per_minute: 10000

# Security
api_key_expiry_days: 365
allow_lan_access: false

# Engine settings
engine_threads: 4
engine_batch_size: 512
